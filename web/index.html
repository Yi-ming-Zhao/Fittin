<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta id="fittin-theme-color" name="theme-color" content="#090806">

  <style>
    :root {
      --fittin-launch-background: #090806;
      --fittin-launch-foreground: #F7F0E3;
      --fittin-launch-accent: #E2BB6A;
      --fittin-launch-secondary: #9D82D1;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--fittin-launch-background);
    }

    .fittin-web-launch {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--fittin-launch-foreground);
      background: var(--fittin-launch-background);
    }

    .fittin-web-launch__lockup {
      display: grid;
      justify-items: center;
      gap: 18px;
    }

    .fittin-web-launch__barbell {
      width: 176px;
      height: 72px;
      animation: fittin-launch-lift 1.5s ease-in-out infinite alternate;
    }

    .fittin-web-launch__wordmark {
      font: 800 28px/1 system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 5.4px;
    }

    @keyframes fittin-launch-lift {
      from { transform: translateY(3px); }
      to { transform: translateY(-3px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .fittin-web-launch__barbell { animation: none; }
    }
  </style>
  <script>
    (() => {
      try {
        const stored = localStorage.getItem('flutter.fittin.appearance.palette');
        const palette = stored === null ? null : JSON.parse(stored);
        const palettes = {
          obsidianBrass: ['#090806', '#F7F0E3', '#E2BB6A', '#9D82D1'],
          midnightCobalt: ['#070A12', '#F4F0EA', '#CF8E5D', '#8296D1'],
          bordeauxVelvet: ['#10070A', '#F8ECE7', '#D7A06E', '#A883B8'],
          porcelainInk: ['#F3EEE5', '#1D1B18', '#B33D36', '#395A7A'],
          espressoEmber: ['#100B08', '#F6EEE6', '#D98254', '#B091C5'],
        };
        const [background, foreground, accent, secondary] =
          palettes[palette] ?? palettes.obsidianBrass;
        const root = document.documentElement.style;
        root.setProperty('--fittin-launch-background', background);
        root.setProperty('--fittin-launch-foreground', foreground);
        root.setProperty('--fittin-launch-accent', accent);
        root.setProperty('--fittin-launch-secondary', secondary);
        document
          .getElementById('fittin-theme-color')
          ?.setAttribute('content', background);
      } catch (_) {
        // Keep the warm-black default when local storage is unavailable.
      }
      window.addEventListener(
        'flutter-first-frame',
        () => document.getElementById('fittin-web-launch')?.remove(),
        { once: true },
      );
    })();
  </script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="fittin_v2">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>fittin_v2</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="fittin-web-launch" class="fittin-web-launch" aria-hidden="true">
    <div class="fittin-web-launch__lockup">
      <svg class="fittin-web-launch__barbell" viewBox="0 0 176 72">
        <line x1="12" y1="36" x2="164" y2="36"
          stroke="currentColor" stroke-width="3" stroke-linecap="round" />
        <g fill="currentColor">
          <rect x="42" y="23.5" width="7" height="25" rx="3" />
          <rect x="127" y="23.5" width="7" height="25" rx="3" />
          <rect x="20" y="24.5" width="6" height="23" rx="3" opacity=".56" />
          <rect x="150" y="24.5" width="6" height="23" rx="3" opacity=".56" />
        </g>
        <g fill="var(--fittin-launch-accent)">
          <rect x="30" y="16.5" width="10" height="39" rx="5" />
          <rect x="136" y="16.5" width="10" height="39" rx="5" />
        </g>
        <g fill="var(--fittin-launch-secondary)">
          <rect x="21" y="20.5" width="8" height="31" rx="4" />
          <rect x="147" y="20.5" width="8" height="31" rx="4" />
        </g>
      </svg>
      <div class="fittin-web-launch__wordmark">FITTIN</div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
