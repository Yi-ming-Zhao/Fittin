server {
    listen 80;
    listen [::]:80;
    server_name fittin.hammerscholar.net;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fittin.hammerscholar.net;

    ssl_certificate /etc/letsencrypt/live/fittin.hammerscholar.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fittin.hammerscholar.net/privkey.pem;

    root /home/wsf/nginx-fittin/current;
    index index.html;
    charset utf-8;
    client_max_body_size 64m;

    location /api/ {
        proxy_pass http://127.0.0.1:24181/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 15s;
    }

    location ~* \.(?:js|wasm|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
